name: Collect Amazon Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'
    - cron: '0 5 * * *'

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx playwright install chrome --with-deps
      - name: Collect and sync to Gist
        env:
          GITHUB_GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GITHUB_GIST_ID: 2a69455c29b1997119a1dd91e4c679ae
          CONFIG_API_URL: https://asin-radar-config.xiaopong190-asin-radar.workers.dev
        run: node run-collection.mjs
